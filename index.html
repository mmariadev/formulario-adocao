<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONG Focinhos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> ONG Focinhos</h1>
    <P>Preencha o formulário abaixo e aguarde nossos colaboradores avaliarem se seu perfil está apto para adoção.</P>
    <form id="formulario.Adocao">

        <div class="nome">
        <label for="nome_completo">Insira seu nome completo:</label><br>
        <input type="text" id="nome_completo" name="nome_completo"<br>
        </div>

        <div class="email">
        <label for="email"><br>Insira seu email:</label><br>
        <input type="email" id="email" name="email"<br>
        </div>

        <div class="telefone">
           <label for="telefone"><br>Insira seu número de telefone:</label><br>
           <input type="tel" id="telefone" name="telefone" pattern="\([0-9]{2}\)\s[0-9]{5}-[0-9]{4}" placeholder="(xx) 9xxxx-xxxx"><br>
        </div>

        <div class="cpf">
            <label for="CPF"><br>Insira seu CPF:</label><br>
            <input type="text" id="CPF" name="CPF" placeholder="000.000.000-00"><br>
        </div>  

        <div class="idade">
            <label for="idade"><br>Selecione sua idade</label><br>
            <input type="number" id="idade" name="idade" min="1" max="100">
        </div>

        <div class="cidade">
            <label for="cidade"><br>Insira sua cidade:</label><br>
            <input type="text" id="cidade" name="cidade"><br>
        </div>

         <label for="moradia">Tipo de moradia</label>
            <select id="moradia" name="moradia" required onchange="verificarMoradia()">
                <option selected disabled value="">Selecione</option>
                <option value="Casa">Casa</option>
                <option value="Apartamento">Apartamento</option>
            </select>
        </div>
        <br>
        <div id="permite_animais">
            <label>O condomínio permite animais?</label>
            <label>
                <input type="radio" name="permite_animais" value="sim">Sim
            </label>
            <label>
                <input type="radio" name="permite_animais" value="nao">Não
            </label>
        </div>
        <br>
        <fieldset id="tem_quintal">
            <label for="quintal">Possui quintal?</label>
            <label>
                <input type="radio" id="tem_quintal_sim" name="tem_quintal" value="sim" required onchange="verificarSeTemQuintal()">Sim
            </label>
            <label>
                <input type="radio" name="tem_quintal" value="nao" onchange="verificarSeTemQuintal()">Não
            </label>
        </fieldset>
        <br>
        <fieldset id="quintal_seguro">
            <label>O quintal é seguro?</label>
            <label>
                <input type="radio" name="quintal" value="sim">Sim
            </label>
            <label>
                <input type="radio" name="quintal" value="nao">Não
            </label>
        </fieldset>
        <br>

        <div class="ja_teve_pet">
            <label for="ja_teve_pet"><br>Já teve um pet?</label><br>
            <input type="radio" id="ja_teve_pet_sim" name="ja_teve_pet" value="sim">
            <label for="ja_teve_pet_sim">Sim</label><br>
            <input type="radio" id="ja_teve_pet_nao" name="ja_teve_pet" value="nao">
            <label for="ja_teve_pet_nao">Não</label><br>
        </div>

        <div class="quantas_horas_pet_sozinho">
            <label for="quantas_horas_pet_sozinho"><br>Quantas horas por dia o pet ficaria sozinho?</label><br>
            <input type="number" id="quantas_horas_pet_sozinho" name="quantas_horas_pet_sozinho" min="0" max="24"><br>
        </div>

        <div class="motivo_adoção">
            <label for="motivo_adoção"><br>Qual o motivo da adoção?</label><br>
            <textarea id="motivo_adoção" name="motivo_adoção" rows="4" cols="38"></textarea><br><br>
        </div>

        <div class="concorda_termos">
            <input type="checkbox" id="concorda_termos" name="concorda_termos" value="sim">
            <label for="concorda_termos"><br>Concordo com os termos e condições de responsabilidade</label><br>
        </div>

        <div class="enviar">
            <input type="submit" value="Enviar">
        </div>
    </main>
    <script src="scripts/regras-negocio.js"></script>
</body>
</html>
